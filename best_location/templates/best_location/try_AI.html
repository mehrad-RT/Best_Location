{% extends "best_location/layout.html" %}

{% block body %}
    <h2>Enter New Information</h2>

    <form action="{% url 'try_AI' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="district_number">District_number</label>
            <input name="district_number" type="number" class="form-control" id="district_number" placeholder="Enter district number" min="1" max="22" step="0.1">
        </div>        
        <div class="form-group">
            <label for="size">Size</label>
            <input name="size" type="number" class="form-control" id="size" placeholder="Enter Size" min="1" step="0.1">
        </div>
        <div class="form-group">
            <label for="product_grade">Product Grade</label>
            <input name="product_grade" type="number" class="form-control" id="product_grade" placeholder="Enter product grade" min="1" max="3" step="0.1">
        </div>
        <div class="form-group">
            <label for="parking_place">Parking Place</label>
            <input type="checkbox" class="form-control" id="parking_place" name="parking_place" value="1">
        </div>
        
        <br>
        <br>
        <button type="submit" class="btn btn-success">Profit Calculation</button>

    </form>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
    </style>

{% endblock %}
